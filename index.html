<!-- Version 3.0 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radiation Heat Transfer Through a Window</title>

  <link rel="stylesheet" href="styles.css?v=3.0" />
</head>

<body>
  <main class="app">
    <section class="scene" aria-label="Radiation heat transfer through a window">
      <img class="image-layer" src="no_sunlight.png" alt="Room with no direct sunlight" />
      <img class="image-layer" src="med-low_sunglight.png" alt="" />
      <img class="image-layer" src="med_sunlight.png" alt="" />
      <img class="image-layer" src="med-high_sunlight.png" alt="" />
      <img class="image-layer" src="high_sunlight.png" alt="" />

      <div class="window-glow" id="windowGlow"></div>
      <div class="light-overlay" id="lightOverlay"></div>
      <div class="floor-glow" id="floorGlow"></div>
      <div class="room-warmth" id="roomWarmth"></div>

      <div class="rays" id="rays"></div>

      <div class="heat-gain" aria-live="polite">
        <span class="heat-gain-label">Heat Gain</span>
        <span class="heat-gain-value" id="heatGainValue">0 BTUH</span>
      </div>

      <div class="selected-time" aria-live="polite">
        <span class="selected-time-label">Selected Time</span>
        <span class="selected-time-value" id="selectedTimeValue">7 AM</span>
      </div>
    </section>

    <section class="controls" aria-label="Time controls">
      <label for="timeSlider">Time</label>

      <div class="slider-group">
        <input
          id="timeSlider"
          type="range"
          min="7"
          max="11"
          step="1"
          value="7"
          aria-label="Select a time from 7 AM through 11 AM"
        />

        <div class="time-ticks" aria-hidden="true">
          <button type="button" data-time="7">7 AM</button>
          <button type="button" data-time="8">8 AM</button>
          <button type="button" data-time="9">9 AM</button>
          <button type="button" data-time="10">10 AM</button>
          <button type="button" data-time="11">11 AM</button>
        </div>
      </div>

      <div class="status-box" id="statusText">No radiant heat transfer</div>
    </section>
  </main>

  <script src="script.js?v=3.0"></script>
</body>
</html>
